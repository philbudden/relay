---
# Samba service configuration for relay_services group

samba_workgroup: "WORKGROUP"
samba_server_string: "Relay NAS"
samba_timezone: "UTC"

samba_shares:
  - name: "ssd"
    path: "/mnt/ssd/shares"
    browseable: "yes"
    readonly: "no"
    guest: "no"
    users: "philbudden,kerrybudden"
    comment: "SSD Storage"
  - name: "backup"
    path: "/mnt/backup/shares"
    browseable: "yes"
    readonly: "no"
    guest: "no"
    users: "philbudden,kerrybudden"
    comment: "Backup Storage"

samba_users:
  - username: "philbudden"
    password: "{{ vault_philbudden_samba_password }}"
    uid: 1000
    gid: 1000
  - username: "kerrybudden"
    password: "{{ vault_kerrybudden_samba_password }}"
    uid: 1001
    gid: 1001
