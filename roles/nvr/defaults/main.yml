---
# nvr role: RTSP camera recording and daily archival service

# Container image configuration
# lscr.io/linuxserver/ffmpeg provides native ARM64 builds
nvr_image: "lscr.io/linuxserver/ffmpeg"
nvr_image_tag: "4.3-cli-ls43"  # Pin explicitly; update deliberately
nvr_use_digest: false
nvr_image_digest: ""  # Optional: add SHA digest for reproducible deploys
nvr_full_image: >-
  {{ nvr_image }}{% if nvr_use_digest and nvr_image_digest %}@{{ nvr_image_digest }}{% else %}:{{ nvr_image_tag }}{% endif %}

# Storage paths
nvr_base_dir: "{{ relay_storage_root }}/nvr"
# Directory where per-camera recordings are stored.
# Override this to save recordings to a different location, e.g.:
#   nvr_recordings_dir: "/mnt/backup/nvr/cameras"
#   nvr_recordings_dir: "/mnt/ssd/nvr-recordings"
# Each camera gets a subdirectory: {{ nvr_recordings_dir }}/[camera-name]/
nvr_recordings_dir: "{{ nvr_base_dir }}/cameras"
nvr_cameras_dir: "{{ nvr_recordings_dir }}"  # internal alias - do not override
nvr_scripts_dir: "{{ nvr_base_dir }}/scripts"
nvr_secrets_dir: "/etc/containers/secrets"

# Recording settings
nvr_segment_duration: 300       # seconds per segment (5 minutes)
nvr_retention_days: 30          # rolling window of daily recordings to keep

# Camera list - REQUIRED: define in inventory with Vault-encrypted RTSP URLs
# nvr_cameras:
#   - name: front-door
#     rtsp_url: "{{ vault_nvr_front_door_rtsp_url }}"
#   - name: back-yard
#     rtsp_url: "{{ vault_nvr_back_yard_rtsp_url }}"
nvr_cameras: []

# systemd service settings
nvr_restart_sec: "30s"
nvr_timeout_start_sec: "120"

# Concat timer schedule (systemd OnCalendar format)
nvr_concat_timer_oncalendar: "*-*-* 01:00:00 UTC"

# Quadlet files
nvr_quadlet_dir: "/etc/containers/systemd"
nvr_concat_timer_file: "/etc/systemd/system/nvr-concat.timer"

# Resource limits (optional - leave empty to disable)
nvr_memory_limit: ""   # Example: "2G"
nvr_cpu_shares: ""     # Example: "512" (half normal priority)

# FFmpeg recorder options
nvr_rtsp_transport: "tcp"         # tcp is more reliable than udp over WiFi/WAN
nvr_ffmpeg_loglevel: "warning"    # Reduce journal noise; use "info" to debug
